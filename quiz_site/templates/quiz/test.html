{% extends 'base.html' %}
{% block content %}
<form method="post">
{% csrf_token %}

{% for q in questions %}
<div class="question">

<h2>{{q.number}}. {{ q.content }}</h2>

{% for option in q.options %}
<label class="radio-option">
    <input type="radio" name="q_{{ q.pk }}" value="{{ option.id }}">
    <span>{{ option.text }}</span>
</label>
<br>
{% endfor %}

</div>
{% endfor %}

<button type="submit">Завершить тест</button>

</form>
{% endblock %}
