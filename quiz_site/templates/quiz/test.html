{% extends 'base.html' %}
{% block content %}
<form method="post">
{% csrf_token %}

{% for q in questions %}
<div class="question">

<h2>{{q.pk}}. {{ q.content }}</h2>

{% for option in q.options %}
<label>{{ option }}
</label>
<input type="radio" name="q_{{ q.pk }}" value="{{ option.id }}">


<br>
{% endfor %}

</div>
{% endfor %}

<button type="submit">Завершить тест</button>

</form>
{% endblock %}
